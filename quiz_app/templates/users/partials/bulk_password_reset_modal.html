<div
  class="modal fade"
  id="bulkPasswordResetModal"
  tabindex="-1"
  aria-labelledby="bulkPasswordResetModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-warning text-dark">
        <h5 class="modal-title" id="bulkPasswordResetModalLabel">
          <i class="bi bi-key me-2"></i>Bulk Password Reset
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="alert alert-warning">
          <i class="bi bi-exclamation-triangle me-2"></i>
          <strong>Warning!</strong> You are about to reset passwords for
          <span id="selectedCount">0</span> user(s).
        </div>
        <p>
          All selected users will have their passwords reset to the default
          password below. They will need to use this password to log in.
        </p>
        <div class="mb-3">
          <label for="defaultPassword" class="form-label"
            >Default Password</label
          >
          <input
            type="text"
            class="form-control"
            id="defaultPassword"
            value="0000"
            placeholder="Enter default password"
          />
          <small class="form-text text-muted">
            This password will be set for all selected users.
          </small>
        </div>
        <div id="selectedUsersList" class="mt-3">
          <!-- Selected users will be listed here -->
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>
        <button
          type="button"
          class="btn btn-warning"
          id="confirmBulkPasswordResetBtn"
        >
          <i class="bi bi-key me-1"></i>Reset Passwords
        </button>
      </div>
    </div>
  </div>
</div>
