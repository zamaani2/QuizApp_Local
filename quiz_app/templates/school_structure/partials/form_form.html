<div
  class="modal fade"
  id="formFormModal"
  tabindex="-1"
  aria-labelledby="formFormModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="formFormModalLabel">
          {% if form_obj %}Edit Form{% else %}Add New Form{% endif %}
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <form id="formForm" method="post">
        {% csrf_token %}
        <div class="modal-body">
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="form_number" class="form-label"
                  >Form Number <span class="text-danger">*</span></label
                >
                <input
                  type="number"
                  class="form-control"
                  id="form_number"
                  name="form_number"
                  value="{% if form_obj %}{{ form_obj.form_number }}{% endif %}"
                  min="1"
                  required
                />
                <small class="text-muted">Must be unique per school</small>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="name" class="form-label"
                  >Form Name <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="name"
                  name="name"
                  value="{% if form_obj %}{{ form_obj.name }}{% endif %}"
                  placeholder="e.g., SHS 1"
                  required
                />
              </div>
            </div>
          </div>
          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea
              class="form-control"
              id="description"
              name="description"
              rows="3"
            >
{% if form_obj %}{{ form_obj.description }}{% endif %}</textarea
            >
          </div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Cancel
          </button>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>{% if form_obj %}Update{% else
            %}Create{% endif %} Form
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
