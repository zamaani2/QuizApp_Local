<div
  class="modal fade"
  id="learningAreaFormModal"
  tabindex="-1"
  aria-labelledby="learningAreaFormModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="learningAreaFormModalLabel">
          {% if learning_area %}Edit Learning Area{% else %}Add New Learning
          Area{% endif %}
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <form id="learningAreaForm" method="post">
        {% csrf_token %}
        <div class="modal-body">
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="code" class="form-label"
                  >Code <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="code"
                  name="code"
                  value="{% if learning_area %}{{ learning_area.code }}{% endif %}"
                  placeholder="e.g., general_arts"
                  required
                />
                <small class="text-muted">Must be unique per school</small>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="name" class="form-label"
                  >Name <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="name"
                  name="name"
                  value="{% if learning_area %}{{ learning_area.name }}{% endif %}"
                  placeholder="e.g., General Arts"
                  required
                />
              </div>
            </div>
          </div>
          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea
              class="form-control"
              id="description"
              name="description"
              rows="3"
            >
{% if learning_area %}{{ learning_area.description }}{% endif %}</textarea
            >
          </div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Cancel
          </button>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>{% if learning_area %}Update{% else
            %}Create{% endif %} Learning Area
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
