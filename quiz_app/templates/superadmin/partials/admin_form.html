<div class="modal-header bg-gradient-purple text-white">
  <h5 class="modal-title">
    {% if admin %}Edit School Administrator{% else %}Add New School Administrator{% endif %}
  </h5>
  <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form id="adminForm" method="post" action="{% if admin %}{% url 'quiz_app:superadmin_admin_edit' admin.id %}{% else %}{% url 'quiz_app:superadmin_admin_create' %}{% endif %}">
  {% csrf_token %}
  <div class="modal-body">
    <div class="row">
      <div class="col-md-6">
        <div class="mb-3">
          <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            value="{% if admin %}{{ admin.username }}{% endif %}"
            {% if admin %}readonly{% else %}required{% endif %}
            placeholder="Enter username"
          />
          {% if admin %}
          <small class="text-muted">Username cannot be changed</small>
          {% endif %}
        </div>
      </div>
      <div class="col-md-6">
        <div class="mb-3">
          <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            value="{% if admin %}{{ admin.email }}{% endif %}"
            required
            placeholder="Enter email address"
          />
        </div>
      </div>
    </div>
    
    <div class="row">
      <div class="col-md-12">
        <div class="mb-3">
          <label for="full_name" class="form-label">Full Name <span class="text-danger">*</span></label>
          <input
            type="text"
            class="form-control"
            id="full_name"
            name="full_name"
            value="{% if admin %}{{ admin.full_name }}{% endif %}"
            required
            placeholder="Enter full name"
          />
        </div>
      </div>
    </div>
    
    <div class="row">
      <div class="col-md-6">
        <div class="mb-3">
          <label for="school" class="form-label">School <span class="text-danger">*</span></label>
          <select class="form-select" id="school" name="school" required>
            <option value="">Select School</option>
            {% for school in schools %}
            <option value="{{ school.id }}" {% if admin and admin.school and admin.school.id == school.id %}selected{% endif %}>
              {{ school.name }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="col-md-6">
        <div class="mb-3">
          <label for="password" class="form-label">
            Password {% if admin %}(leave blank to keep current){% else %}<span class="text-danger">*</span>{% endif %}
          </label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            {% if not admin %}required{% endif %}
            placeholder="{% if admin %}Enter new password (optional){% else %}Enter password{% endif %}"
          />
          {% if not admin %}
          <small class="text-muted">Default: 0000 (if left blank)</small>
          {% endif %}
        </div>
      </div>
    </div>
    
    {% if admin %}
    <div class="row">
      <div class="col-md-12">
        <div class="mb-3">
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              id="is_active"
              name="is_active"
              {% if admin.is_active %}checked{% endif %}
            />
            <label class="form-check-label" for="is_active">
              Active Account
            </label>
          </div>
        </div>
      </div>
    </div>
    {% endif %}
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-primary">
      <i class="bi bi-save me-1"></i>{% if admin %}Update{% else %}Create{% endif %} Administrator
    </button>
  </div>
</form>

<style>
.bg-gradient-purple {
  background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
}
</style>

<script>
  $(document).ready(function() {
    // Handle form submission
    $('#adminForm').on('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const url = $(this).attr('action');
      
      $.ajax({
        url: url,
        method: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        headers: {
          'X-CSRFToken': $('[name=csrfmiddlewaretoken]').val()
        },
        success: function(response) {
          if (response.success) {
            $('#adminFormModal').modal('hide');
            if (typeof Swal !== 'undefined') {
              Swal.fire({
                icon: 'success',
                title: 'Success!',
                text: response.message || 'Administrator saved successfully.',
                timer: 2000,
                showConfirmButton: false
              }).then(function() {
                location.reload();
              });
            } else {
              location.reload();
            }
          } else {
            alert(response.error || 'Error saving administrator');
          }
        },
        error: function(xhr) {
          let errorMsg = 'Error saving administrator';
          if (xhr.responseJSON && xhr.responseJSON.error) {
            errorMsg = xhr.responseJSON.error;
          }
          alert(errorMsg);
        }
      });
    });
  });
</script>
