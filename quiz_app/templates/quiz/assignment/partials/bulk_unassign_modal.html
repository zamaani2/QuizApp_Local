<div
  class="modal fade"
  id="bulkUnassignModal"
  tabindex="-1"
  aria-labelledby="bulkUnassignModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title" id="bulkUnassignModalLabel">
          <i class="bi bi-exclamation-triangle me-2"></i>Bulk Unassign Classes
        </h5>
        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="alert alert-danger">
          <i class="bi bi-exclamation-triangle me-2"></i>
          <strong>Warning!</strong> You are about to unassign
          <span id="selectedClassesCount">0</span> class(es) from this quiz.
        </div>
        <p>
          Are you sure you want to proceed? Students in these classes will no
          longer be able to access this quiz.
        </p>
        <div id="selectedClassesList" class="mt-3">
          <!-- Selected classes will be listed here -->
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>
        <button
          type="button"
          class="btn btn-danger"
          id="confirmBulkUnassignBtn"
        >
          <i class="bi bi-x-circle me-1"></i>Unassign Selected
        </button>
      </div>
    </div>
  </div>
</div>
