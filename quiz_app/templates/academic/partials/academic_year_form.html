<div
  class="modal fade"
  id="academicYearFormModal"
  tabindex="-1"
  aria-labelledby="academicYearFormModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="academicYearFormModalLabel">
          {% if academic_year %}Edit Academic Year{% else %}Add New Academic
          Year{% endif %}
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <form id="academicYearForm" method="post">
        {% csrf_token %}
        <div class="modal-body">
          <div class="mb-3">
            <label for="name" class="form-label"
              >Academic Year Name <span class="text-danger">*</span></label
            >
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              value="{% if academic_year %}{{ academic_year.name }}{% endif %}"
              placeholder="e.g., 2024/2025"
              required
            />
            <small class="text-muted"
              >Format: YYYY/YYYY (e.g., 2024/2025)</small
            >
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="start_date" class="form-label"
                  >Start Date <span class="text-danger">*</span></label
                >
                <input
                  type="date"
                  class="form-control"
                  id="start_date"
                  name="start_date"
                  value="{% if academic_year %}{{ academic_year.start_date|date:'Y-m-d' }}{% endif %}"
                  required
                />
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="end_date" class="form-label"
                  >End Date <span class="text-danger">*</span></label
                >
                <input
                  type="date"
                  class="form-control"
                  id="end_date"
                  name="end_date"
                  value="{% if academic_year %}{{ academic_year.end_date|date:'Y-m-d' }}{% endif %}"
                  required
                />
              </div>
            </div>
          </div>

          <div class="mb-3">
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                id="is_current"
                name="is_current"
                {%
                if
                academic_year
                and
                academic_year.is_current
                %}checked{%
                endif
                %}
              />
              <label class="form-check-label" for="is_current">
                Set as Current Academic Year
              </label>
            </div>
            <small class="text-muted"
              >Only one academic year can be current at a time.</small
            >
          </div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Cancel
          </button>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>{% if academic_year %}Update{% else
            %}Create{% endif %} Academic Year
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
