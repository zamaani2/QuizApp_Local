<div class="modal fade" id="studentFormModal" tabindex="-1" aria-labelledby="studentFormModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="studentFormModalLabel">
          {% if student %}Edit Student{% else %}Add New Student{% endif %}
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form id="studentForm" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="modal-body">
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="full_name" class="form-label">Full Name <span class="text-danger">*</span></label>
                <input
                  type="text"
                  class="form-control"
                  id="full_name"
                  name="full_name"
                  value="{% if student %}{{ student.full_name }}{% endif %}"
                  required
                />
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="date_of_birth" class="form-label">Date of Birth <span class="text-danger">*</span></label>
                <input
                  type="date"
                  class="form-control"
                  id="date_of_birth"
                  name="date_of_birth"
                  value="{% if student %}{{ student.date_of_birth|date:'Y-m-d' }}{% endif %}"
                  required
                />
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="gender" class="form-label">Gender <span class="text-danger">*</span></label>
                <select class="form-select" id="gender" name="gender" required>
                  <option value="">Select Gender</option>
                  <option value="M" {% if student and student.gender == 'M' %}selected{% endif %}>Male</option>
                  <option value="F" {% if student and student.gender == 'F' %}selected{% endif %}>Female</option>
                </select>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="parent_contact" class="form-label">Parent Contact <span class="text-danger">*</span></label>
                <input
                  type="text"
                  class="form-control"
                  id="parent_contact"
                  name="parent_contact"
                  value="{% if student %}{{ student.parent_contact }}{% endif %}"
                  required
                />
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="admission_date" class="form-label">Admission Date <span class="text-danger">*</span></label>
                <input
                  type="date"
                  class="form-control"
                  id="admission_date"
                  name="admission_date"
                  value="{% if student %}{{ student.admission_date|date:'Y-m-d' }}{% endif %}"
                  required
                />
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="admission_number" class="form-label">Admission Number{% if student %} <span class="text-danger">*</span>{% else %} <small class="text-muted">(optional, auto-generated if not provided)</small>{% endif %}</label>
                <input
                  type="text"
                  class="form-control"
                  id="admission_number"
                  name="admission_number"
                  value="{% if student %}{{ student.admission_number }}{% endif %}"
                  {% if student %}required{% endif %}
                  maxlength="10"
                />
                {% if student %}
                <small class="text-muted">You can edit the admission number. Make sure it's unique.</small>
                {% endif %}
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="email"
                  value="{% if student %}{{ student.email }}{% endif %}"
                />
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="form" class="form-label">Form</label>
                <select class="form-select" id="form" name="form">
                  <option value="">Select Form</option>
                  {% for form in forms %}
                  <option value="{{ form.id }}" {% if student and student.form and student.form.id == form.id %}selected{% endif %}>
                    {{ form.name }}
                  </option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="learning_area" class="form-label">Learning Area</label>
                <select class="form-select" id="learning_area" name="learning_area">
                  <option value="">Select Learning Area</option>
                  {% for area in learning_areas %}
                  <option value="{{ area.id }}" {% if student and student.learning_area and student.learning_area.id == area.id %}selected{% endif %}>
                    {{ area.name }}
                  </option>
                  {% endfor %}
                </select>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-12">
              <div class="mb-3">
                <label for="profile_picture" class="form-label">Profile Picture</label>
                <input
                  type="file"
                  class="form-control"
                  id="profile_picture"
                  name="profile_picture"
                  accept="image/*"
                />
                {% if student and student.profile_picture %}
                <small class="text-muted">Current: {{ student.profile_picture.name }}</small>
                {% endif %}
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>{% if student %}Update{% else %}Create{% endif %} Student
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
